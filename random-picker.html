<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Random Picker</title>

    <style>
        :root{
            --bg1:#f6f8ff;
            --bg2:#eef6ff;
            --card:#ffffff;
            --accent:#5b7cff;
            --accent-2:#7be0ff;
            --muted:#6b7280;
            --glass: rgba(255,255,255,0.6);
            --radius:14px;
            --shadow: 0 8px 30px rgba(36,37,62,0.08);
        }

        *{box-sizing:border-box}
        html,body{height:100%}
        body {
            margin:0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: linear-gradient(135deg,var(--bg1),var(--bg2));
            -webkit-font-smoothing:antialiased;
            color:#0f172a;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:32px;
        }

        .shell{
            width:100%;
            max-width:820px;
            background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.6));
            border-radius:calc(var(--radius) + 6px);
            padding:28px;
            box-shadow:var(--shadow);
            backdrop-filter: blur(6px) saturate(120%);
            border:1px solid rgba(99,102,241,0.06);
        }

        header{
            display:flex;
            align-items:center;
            gap:16px;
            margin-bottom:12px;
        }

        h1{
            font-size:20px;
            margin:0;
            letter-spacing:-0.2px;
        }

        p.lead{
            margin:6px 0 18px 0;
            color:var(--muted);
            font-size:14px;
        }

        textarea {
            width:100%;
            min-height:220px;
            padding:14px 16px;
            font-size:15px;
            border-radius:10px;
            border:1px solid rgba(15,23,42,0.06);
            resize:vertical;
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
            line-height:1.5;
            transition:box-shadow 160ms, transform 160ms;
            background: linear-gradient(180deg, #fff, #fbfdff);
        }
        textarea:focus{
            outline:none;
            box-shadow:0 6px 18px rgba(91,124,255,0.12);
            transform:translateY(-2px);
            border-color:var(--accent);
        }

        .controls{
            display:flex;
            gap:12px;
            align-items:center;
            justify-content:flex-end;
            margin-top:14px;
        }

        button.primary{
            background: linear-gradient(90deg,var(--accent), #4f6bff);
            color:white;
            border:none;
            padding:12px 18px;
            font-size:15px;
            border-radius:10px;
            cursor:pointer;
            box-shadow: 0 8px 20px rgba(79,107,255,0.18);
            transition:transform 160ms, box-shadow 160ms, opacity 120ms;
        }
        button.primary:hover{transform:translateY(-3px)}
        button.ghost{
            background:transparent;
            color:var(--muted);
            border:1px solid rgba(15,23,42,0.06);
            padding:10px 14px;
            border-radius:10px;
            cursor:pointer;
        }

        .meta{
            display:flex;
            gap:12px;
            align-items:center;
            color:var(--muted);
            font-size:13px;
            flex:1;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(6,8,20,0.48);
            z-index:60;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .modal-content {
            background: linear-gradient(180deg,#ffffff,#fbfdff);
            width:480px;
            max-width:96%;
            margin:auto;
            padding:28px 26px;
            border-radius:16px;
            text-align:center;
            box-shadow: 0 16px 50px rgba(15,23,42,0.18);
            transform-origin:center;
            animation:pop 260ms cubic-bezier(.2,.9,.26,1);
            position:relative;
        }

        .close-x{
            position:absolute;
            right:12px;
            top:10px;
            background:transparent;
            border:none;
            font-size:20px;
            color:var(--muted);
            cursor:pointer;
        }

        .winner {
            font-size:28px;
            font-weight:700;
            margin-top:8px;
            color:#0f172a;
            word-break:break-word;
        }

        .subtext{
            color:var(--muted);
            margin-top:8px;
            font-size:13px;
        }

        @keyframes pop {
            from {transform: translateY(6px) scale(0.96); opacity:0}
            to {transform: translateY(0) scale(1); opacity:1}
        }

        @media (max-width:520px){
            .shell{padding:18px}
            textarea{min-height:160px}
            .winner{font-size:22px}
        }

    </style>
</head>
<body>

    <div class="shell">
        <header>
            <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:white;font-weight:600;">🎲</div>
            <div>
                <h1>Random Picker</h1>
                <p class="lead">Paste one item per line, then choose a random winner.</p>
            </div>
        </header>

        <textarea id="items" placeholder="One item per line"></textarea>

        <div class="controls">
            <div class="meta">Tip: press Ctrl+Enter to pick quickly</div>
            <button class="ghost" onclick="document.getElementById('items').value=''">Clear</button>
            <button class="primary" id="chooseBtn">Choose Random</button>
        </div>

    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-x" aria-label="Close" onclick="closeModal()">✕</button>
            <h2>🎉 Selected Item</h2>
            <div class="winner" id="winner"></div>
            <div class="subtext">Congratulations — copy it or pick again.</div>
            <div style="margin-top:18px;display:flex;gap:10px;justify-content:center">
                <button class="ghost" onclick="closeModal()">Close</button>
                <button class="primary" id="pickAgain">Pick Again</button>
            </div>
        </div>
    </div>

    <script>
        function pickRandom() {
            const items = document
                .getElementById("items")
                .value
                .split("\n")
                .map(x => x.trim())
                .filter(x => x);

            if (!items.length) {
                alert("Please enter some items.");
                return;
            }

            const winner = items[Math.floor(Math.random() * items.length)];
            document.getElementById("winner").textContent = winner;
            document.getElementById("modal").style.display = "flex";
            document.getElementById('chooseBtn').blur();
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById("modal");
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }

        document.getElementById('chooseBtn').addEventListener('click', pickRandom);
        document.getElementById('pickAgain').addEventListener('click', pickRandom);

        document.getElementById('items').addEventListener('keydown', function(e){
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                pickRandom();
            }
        });
    </script>

</body>
</html>
